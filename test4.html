<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LONGSKILL - Career Simulator AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-blue: #1e40af;
            --dark-blue: #0f172a;
        }
        body { 
            background: linear-gradient(135deg, var(--dark-blue) 0%, #1e3a8a 100%); 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 40px 0;
        }
        .header-brand {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 3px;
            color: #ffffff;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
        .card { 
            background: rgba(255, 255, 255, 0.98); 
            color: #1e3a8a; 
            border-radius: 24px; 
            border: none;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }
        .nav-pills .nav-link { color: var(--primary-blue); font-weight: bold; border: 1px solid var(--primary-blue); margin: 0 5px; }
        .nav-pills .nav-link.active { background-color: var(--primary-blue); color: white; }
        .btn-primary { background-color: var(--primary-blue); border: none; padding: 12px; font-weight: bold; border-radius: 12px; }
        .btn-outline-secondary { border-radius: 12px; }
        .step-container { display: none; }
        .active { display: block; animation: slideUp 0.4s ease-out; }
        label { font-weight: 600; font-size: 0.85rem; color: #475569; margin-bottom: 5px; }
        .form-control { border-radius: 10px; border: 1px solid #cbd5e1; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        canvas { max-width: 100%; margin: 20px auto; }
    </style>
</head>
<body>

<div class="container text-center">
    <h1 class="header-brand">LONGSKILL</h1>

    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-7 card shadow-lg p-0 text-start">
            
            <div id="step-auth" class="step-container active">
                <div class="p-4 text-center border-bottom">
                    <h3 class="fw-bold mb-0">เริ่มต้นใช้งาน</h3>
                </div>
                
                <ul class="nav nav-pills nav-justified m-4" id="pills-tab" role="tablist">
                    <li class="nav-item">
                        <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#pills-login" type="button">Log In</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="pill" data-bs-target="#pills-signup" type="button">Sign Up</button>
                    </li>
                </ul>

                <div class="tab-content p-4 pt-0">
                    <div class="tab-pane fade show active" id="pills-login">
                        <div class="mb-3">
                            <label>อีเมล (Email)</label>
                            <input type="email" id="login-email" class="form-control" placeholder="name@email.com">
                        </div>
                        <div class="mb-4">
                            <label>รหัสผ่าน (Password)</label>
                            <input type="password" id="login-pass" class="form-control" placeholder="••••••••">
                        </div>
                        <button class="btn btn-primary w-100" onclick="handleAuth('login')">เข้าสู่ระบบ</button>
                    </div>

                    <div class="tab-pane fade" id="pills-signup">
                        <div class="row g-2 mb-3">
                            <div class="col-8">
                                <label>ชื่อ-นามสกุล</label>
                                <input type="text" id="reg-name" class="form-control" placeholder="สมชาย ใจดี">
                            </div>
                            <div class="col-4">
                                <label>อายุ</label>
                                <input type="number" id="reg-age" class="form-control" placeholder="20">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label>Username</label>
                            <input type="text" id="reg-user" class="form-control" placeholder="username123">
                        </div>
                        <div class="mb-3">
                            <label>อีเมล (Email)</label>
                            <input type="email" id="reg-email" class="form-control" placeholder="name@email.com">
                        </div>
                        <div class="row g-2 mb-4">
                            <div class="col-6">
                                <label>รหัสผ่าน</label>
                                <input type="password" id="reg-pass" class="form-control" placeholder="••••••••">
                            </div>
                            <div class="col-6">
                                <label>ยืนยันรหัสผ่าน</label>
                                <input type="password" id="reg-confirm" class="form-control" placeholder="••••••••">
                            </div>
                        </div>
                        <button class="btn btn-primary w-100" onclick="handleAuth('signup')">สร้างบัญชี LONGSKILL</button>
                    </div>
                </div>
            </div>

            <div id="step-profile" class="step-container p-4">
                <h3 class="fw-bold mb-3 text-center">สวัสดีคุณ <span id="user-display" class="text-primary"></span></h3>
                <div class="mb-4">
                    <label>เป้าหมายหรือทักษะปัจจุบันของคุณ</label>
                    <textarea id="user-bio" class="form-control" rows="4" placeholder="เช่น ฉันมีความสนใจด้านการตลาดและอยากลองวางแผนกลยุทธ์..."></textarea>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-secondary flex-fill" onclick="showStep('step-auth')">ย้อนกลับ</button>
                    <button class="btn btn-primary flex-fill" onclick="showStep('step-selection')">เลือกอาชีพที่สนใจ</button>
                </div>
            </div>

            <div id="step-selection" class="step-container p-4">
                <h3 class="fw-bold mb-4 text-center">🎯 1. เลือกอาชีพที่สนใจ</h3>
                <div class="d-grid gap-3">
                    <button class="btn btn-outline-primary py-3 fw-bold" onclick="startSim('โปรแกรมเมอร์')">💻 โปรแกรมเมอร์</button>
                    <button class="btn btn-outline-primary py-3 fw-bold" onclick="startSim('นักการตลาดดิจิทัล')">📈 นักการตลาดดิจิทัล</button>
                    <button class="btn btn-outline-primary py-3 fw-bold" onclick="startSim('นักออกแบบ')">🎨 นักออกแบบ</button>
                </div>
                <div class="text-center mt-4">
                    <button class="btn btn-link text-muted" onclick="showStep('step-profile')">← กลับไปหน้าโปรไฟล์</button>
                </div>
            </div>

            <div id="step-simulation" class="step-container p-4">
                <h4 id="display-career" class="text-primary fw-bold mb-3"></h4>
                <div class="alert alert-primary p-3 mb-3" id="task-box"></div>
                <label>แนวทางแก้ไขหรือคำตอบของคุณ:</label>
                <textarea id="user-answer" class="form-control mb-4" rows="5" placeholder="พิมพ์คำตอบของคุณ..."></textarea>
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-secondary w-25" onclick="showStep('step-selection')">ย้อนกลับ</button>
                    <button id="btn-analyze" class="btn btn-success w-75 fw-bold" onclick="analyzeWithAI()">3. ประเมินทักษะด้วย LONGSKILL AI</button>
                </div>
            </div>

            <div id="step-dashboard" class="step-container p-4 text-center">
                <h4 class="fw-bold mb-3">📊 ผลการประเมินจาก LONGSKILL AI</h4>
                <div id="ai-feedback" class="text-start p-3 bg-light border-start border-primary border-4 mb-4"></div>
                <canvas id="radarChart"></canvas>
                <div class="mt-4 pt-3 border-top d-grid gap-2">
                    <button class="btn btn-primary" onclick="showStep('step-selection')">ทดลองอาชีพอื่น</button>
                    <button class="btn btn-outline-danger" onclick="location.reload()">จบการทำงาน / เริ่มใหม่</button>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    let userData = { name: "", bio: "", history: [] };
    let currentCareer = "";
    let myChart = null;

    function showStep(stepId) {
        document.querySelectorAll('.step-container').forEach(el => el.classList.remove('active'));
        document.getElementById(stepId).classList.add('active');
        window.scrollTo(0, 0);
    }

    function handleAuth(type) {
        if (type === 'signup') {
            const pass = document.getElementById('reg-pass').value;
            const confirm = document.getElementById('reg-confirm').value;
            if (pass !== confirm) return alert("รหัสผ่านไม่ตรงกัน!");
            userData.name = document.getElementById('reg-name').value || "User";
        } else {
            userData.name = "ผู้ใช้งานทั่วไป";
        }
        document.getElementById('user-display').innerText = userData.name;
        showStep('step-profile');
    }

    function startSim(career) {
        currentCareer = career;
        document.getElementById('display-career').innerText = "2. ภารกิจ: " + career;
        const tasks = {
            'โปรแกรมเมอร์': 'โจทย์: เว็บไซต์ขายของล่มในช่วงเทศกาล 12.12 คุณจะเริ่มแก้ปัญหาที่จุดไหนก่อน?',
            'นักการตลาดดิจิทัล': 'โจทย์: มีงบ 1,000 บาท ต้องการหาลูกค้าใหม่ให้ร้านอาหารภายใน 24 ชม. คุณจะใช้กลยุทธ์อะไร?',
            'นักออกแบบ': 'โจทย์: ลูกค้าต้องการโลโก้ที่ดู "หรูหราแต่เรียบง่าย" คุณจะใช้คู่สีและฟอนต์แนวไหน?'
        };
        document.getElementById('task-box').innerText = tasks[career];
        showStep('step-simulation');
    }

    function analyzeWithAI() {
        const answer = document.getElementById('user-answer').value;
        if (!answer) return alert("กรุณาพิมพ์คำตอบ");

        const btn = document.getElementById('btn-analyze');
        btn.disabled = true;
        btn.innerText = "LONGSKILL AI กำลังวิเคราะห์...";

        setTimeout(() => {
            const scores = [8, 7, 9, 6, 8]; // คะแนนจำลอง
            const feedback = `LONGSKILL AI วิเคราะห์ว่าคุณมีทักษะด้านการตัดสินใจในอาชีพ ${currentCareer} ที่ดีเยี่ยม แต่ควรเพิ่มความละเอียดในขั้นตอนการตรวจสอบข้อมูล`;
            
            document.getElementById('ai-feedback').innerText = feedback;
            renderChart(scores);
            showStep('step-dashboard');
            
            btn.disabled = false;
            btn.innerText = "3. ประเมินทักษะด้วย LONGSKILL AI";
            document.getElementById('user-answer').value = "";
        }, 1500);
    }

    function renderChart(scores) {
        const ctx = document.getElementById('radarChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['ความเร็ว', 'เทคนิค', 'ไอเดีย', 'ความแม่นยำ', 'การสื่อสาร'],
                datasets: [{
                    label: 'คะแนนทักษะของคุณ',
                    data: scores,
                    backgroundColor: 'rgba(30, 64, 175, 0.2)',
                    borderColor: '#1e40af',
                    pointBackgroundColor: '#1e40af'
                }]
            },
            options: { scales: { r: { beginAtZero: true, max: 10 } } }
        });
    }
</script>

</body>
</html>
